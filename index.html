<meta charset="UTF-8">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Life RPG">

<title>Life RPG – Habit Tracker</title>

<style>
:root{--bg:#08060f;--bg2:#0f0c26;--bg3:#13103a;--border:#1e1b4b;--purple:#7c3aed;--purple2:#a78bfa;--gold:#fbbf24;--red:#ef4444;--green:#22c55e;--blue:#6366f1;--pink:#f9a8d4;--teal:#14b8a6}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:#e9d5ff;font-family:'Crimson Pro',serif}
body{max-width:430px;margin:0 auto;position:relative}
input,select,button,textarea{font-family:'Crimson Pro',serif}
input,select{color:#e9d5ff;background:transparent}
input::placeholder{color:#374151}
button{cursor:pointer;border:none}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:#2d2a6e;border-radius:99px}
.cinzel{font-family:'Cinzel',serif}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}
#header{flex-shrink:0;background:linear-gradient(180deg,#110d2e,#08060f);border-bottom:1px solid var(--border);padding:12px 16px 10px;z-index:10}
#content{flex:1;overflow-y:auto;padding:10px 16px 0;padding-bottom:80px}
#nav{flex-shrink:0;position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(8,6,15,0.95);backdrop-filter:blur(12px);border-top:1px solid var(--border);padding:6px 0 8px;display:flex;justify-content:space-around;z-index:20}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:1px;background:none;border:none;color:#4b5563;font-size:18px;padding:2px 8px;transition:color .2s;min-width:44px;min-height:44px;justify-content:center}
.nav-btn.active{color:var(--purple2)}
.nav-btn span{font-family:'Cinzel',serif;font-size:9px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:10px}
.bar-wrap{background:#0d0b1e;border-radius:99px;overflow:hidden;border:1px solid var(--border)}
.bar-fill{height:100%;border-radius:99px;transition:width .5s ease}
.badge{display:inline-block;font-size:9px;padding:1px 6px;border-radius:99px;font-weight:600}
.section-title{font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;color:var(--purple);margin-bottom:8px}
.btn-primary{background:linear-gradient(90deg,#4f46e5,var(--purple));color:#fff;border:none;border-radius:10px;padding:11px;font-family:'Cinzel',serif;font-size:12px;font-weight:700;letter-spacing:1px;width:100%;box-shadow:0 0 16px #7c3aed44}
.btn-gold{background:linear-gradient(90deg,#92400e,var(--gold));color:#000;border:none;border-radius:10px;padding:10px;font-family:'Cinzel',serif;font-size:12px;font-weight:900;letter-spacing:1px;width:100%;box-shadow:0 0 20px #fbbf2444}
.input-field{width:100%;padding:9px 12px;border-radius:8px;background:#080614;border:1px solid #2d2a6e;color:#e9d5ff;font-size:13px;margin-bottom:8px;font-family:'Crimson Pro',serif}
.select-field{width:100%;padding:9px 12px;border-radius:8px;background:#080614;border:1px solid #2d2a6e;color:#e9d5ff;font-size:13px;margin-bottom:8px;font-family:'Crimson Pro',serif;-webkit-appearance:none;appearance:none}

/* Home Scene */
.home-scene{position:relative;height:110px;border-radius:12px;overflow:hidden;margin-bottom:10px;border:1px solid var(--border)}
.scene-sky{position:absolute;inset:0}
.scene-ground{position:absolute;bottom:0;left:0;right:0}
.scene-element{position:absolute}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle 2s infinite alternate}
@keyframes twinkle{0%{opacity:.3;transform:scale(.8)}100%{opacity:1;transform:scale(1.1)}}
@keyframes flicker{0%,100%{opacity:.8;transform:scaleY(1)}50%{opacity:1;transform:scaleY(1.1)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes drift{0%{transform:translateX(-20px)}100%{transform:translateX(calc(100vw + 20px))}}
@keyframes smoke{0%{opacity:.5;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-20px) scale(1.5)}}

/* Overlay */
.overlay{position:fixed;inset:0;background:#000000cc;z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{width:100%;max-width:340px;background:linear-gradient(135deg,#13103a,#0d0b1e);border:1px solid #2d2a6e;border-radius:16px;padding:20px;max-height:85vh;overflow-y:auto}

/* Animations */
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-80px) scale(1.1)}}
@keyframes levelUp{0%{transform:scale(.3);opacity:0}60%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
@keyframes bossIn{0%{transform:scale(.5) rotate(-10deg);opacity:0}100%{transform:scale(1) rotate(0);opacity:1}}

.float-note{position:fixed;top:20px;right:16px;z-index:999;pointer-events:none}
.float-item{font-family:'Cinzel',serif;font-size:13px;font-weight:700;background:#13103a;border:1px solid var(--blue);border-radius:10px;padding:5px 13px;margin-bottom:4px;animation:floatUp 2s ease-out forwards;box-shadow:0 0 12px #4f46e544}

/* Quest card */
.quest-card{background:var(--bg3);border:1px solid;border-radius:11px;margin-bottom:8px;overflow:hidden;transition:all .3s}
.quest-card.done{background:#0d0a1e;border-color:var(--border);opacity:.5}
.quest-header{padding:10px 12px;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.quest-expand{background:#0d0b1e;border-top:1px solid;padding:12px 14px}

/* Die */
.die{display:inline-flex;align-items:center;justify-content:center;width:72px;height:72px;border-radius:10px;font-family:'Cinzel',serif;font-size:28px;font-weight:900;user-select:none;cursor:pointer;transition:all .15s;border:2px solid}

/* Attr grid */
.attr-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.attr-cell{text-align:center;padding:6px 3px;background:#0d0b1e;border-radius:8px;border:1px solid}
</style>
</head>

// GAME LOGIC

function d20(){return Math.floor(Math.random()*20)+1;}
function attrMod(v){return Math.floor((v-10)/2);}

function computedAttrs(){
  const b={...S.baseAttrs};
  Object.values(S.character.equipment).forEach(item=>{
    if(!item)return;
    Object.entries(item.stats).forEach(([k,v])=>{b[k]=(b[k]||0)+v;});
  });
  if(S.character.equippedPet){
    const p=PETS.find(x=>x.id===S.character.equippedPet);
    if(p)Object.entries(p.effect).forEach(([k,v])=>{b[k]=(b[k]||0)+v;});
  }
  return b;
}

function getLoot(roll){
  if(roll===1)return LOOT[1];
  if(roll===20)return LOOT[20];
  if(roll<=9)return LOOT["2-9"];
  if(roll<=14)return LOOT["10-14"];
  return LOOT["15-19"];
}

function weightedRarity(tier){
  const w=R_WEIGHTS[tier];if(!w)return"common";
  const total=Object.values(w).reduce((a,b)=>a+b,0);
  let r=Math.random()*total;
  for(const[rar,wt]of Object.entries(w)){r-=wt;if(r<=0)return rar;}
  return"common";
}

function randomItemByTier(tier){
  const rar=weightedRarity(tier);
  const pool=ITEMS.filter(i=>i.rarity===rar);
  const fallback=ITEMS.filter(i=>R_ORDER.indexOf(i.rarity)<=R_ORDER.indexOf(rar));
  const src=pool.length?pool:fallback;
  return src[Math.floor(Math.random()*src.length)];
}

function randomPetByMinRarity(min="common"){
  const minIdx=R_ORDER.indexOf(min);
  const pool=PETS.filter(p=>R_ORDER.indexOf(p.rarity)>=minIdx);
  return pool[Math.floor(Math.random()*pool.length)];
}

function gainXPGold(xp,gold){
  S.character.gold+=gold;
  S.character.xp+=xp;
  let lvledUp=false;
  while(S.character.xp>=S.character.xpToNext){
    S.character.xp-=S.character.xpToNext;
    S.character.level++;
    S.character.xpToNext=Math.floor(S.character.xpToNext*1.5);
    lvledUp=true;
  }
  if(lvledUp)setTimeout(()=>{MODAL={type:"levelup"};render();},600);
  checkTitles();
}

function checkTitles(){
  // nothing to store, titles computed on render
}

function getEarnedTitles(){
  return TITLES.filter(t=>{try{return t.req(S);}catch{return false;}});
}

function getLevelTitle(l){
  const t=["Neuling","Lehrling","Abenteurer","Kämpfer","Veteran","Meister","Champion","Held","Legende","Halbgott","Gottheit"];
  return t[Math.min(Math.floor(l/5),t.length-1)];
}

function getHomeBase(){
  return[...HOME_BASES].reverse().find(h=>S.character.level>=h.lvl)||HOME_BASES[0];
}

function addLog(text){
  const time=new Date().toLocaleTimeString("de",{hour:"2-digit",minute:"2-digit"});
  S.log=[{text,time},...S.log.slice(0,49)];
}

// Quest completion
function completeQuestById(questId,dungeonId){
  const qList=dungeonId?S.dungeons.find(d=>d.id===dungeonId)?.quests:S.quests;
  const quest=qList?.find(q=>q.id===questId);
  if(!quest||quest.done)return;

  const attrs=computedAttrs();
  const attrKey=CAT_ATTR[quest.cat];
  const mod=attrMod(attrs[attrKey]||8);
  const diceMod=S.buffs?.dicemod||0;
  const raw=d20();
  const total=Math.min(raw+mod+diceMod,20);
  const loot=getLoot(total===20?20:raw===1?1:total);

  if(S.buffs?.dicemod>0){S.buffs.dicemod=Math.max(0,S.buffs.dicemod-diceMod);if(!S.buffs.dicemod)delete S.buffs.dicemod;}

  let item=null,pet=null;
  if(loot.iC>Math.random())item=randomItemByTier(loot.tier);
  if(loot.pC>Math.random())pet=randomPetByMinRarity("common");

  const goldM=S.buffs?.goldboost?2:1;
  if(S.buffs?.goldboost)delete S.buffs.goldboost;
  const earnedXP=Math.floor(quest.xp*loot.xpM);
  const earnedGold=Math.floor(quest.gold*loot.goldM*goldM);

  if(raw===20)S.nat20Count=(S.nat20Count||0)+1;

  if(item)S.inventory.push({...item,uid:Date.now()});
  if(pet&&!S.zoo.find(p=>p.id===pet.id))S.zoo.push({...pet,petLevel:1});

  const newStreak=loot.tier==="fail"?0:S.character.streak+1;
  S.character.streak=newStreak;
  gainXPGold(earnedXP,earnedGold);

  if(dungeonId){S.dungeons=S.dungeons.map(d=>d.id===dungeonId?{...d,quests:d.quests.map(q=>q.id===questId?{...q,done:true}:q)}:d);}
  else{S.quests=S.quests.map(q=>q.id===questId?{...q,done:true}:q);}

  const storyLine=loot.story[Math.floor(Math.random()*loot.story.length)];
  addLog(`${quest.title}: ${loot.label} (${raw}) +${earnedXP}XP — "${storyLine}"`);
  saveState();

  MODAL={type:"rollresult",data:{raw,total,mod,diceMod,loot,quest,item,pet,earnedXP,earnedGold}};
  render();
}

function buyShopItem(id){
  const item=SHOP_ITEMS.find(i=>i.id===id);
  if(!item||S.character.gold<item.cost)return;
  S.character.gold-=item.cost;
  const e=item.eff;
  if(e==="hp+30")S.character.hp=Math.min(S.character.hp+30,S.character.maxHp);
  if(e==="hp+80")S.character.hp=Math.min(S.character.hp+80,S.character.maxHp);
  if(e==="goldboost")S.buffs.goldboost=true;
  if(e==="dicemod+3")S.buffs.dicemod=(S.buffs.dicemod||0)+3;
  if(e==="streakshield")S.buffs.streakshield=true;
  if(e==="maxhp+20"){S.character.maxHp+=20;S.character.hp+=20;}
  if(e==="xp+50")gainXPGold(50,0);
  if(e==="attr:STR+1")S.baseAttrs.STR++;
  if(e==="attr:INT+1")S.baseAttrs.INT++;
  if(e==="attr:WIS+1")S.baseAttrs.WIS++;
  if(e.startsWith("loot:")){const t=e.split(":")[1];const ni=randomItemByTier(t);if(ni)S.inventory.push({...ni,uid:Date.now()});}
  if(e.startsWith("pet:")){const minR=e.split(":")[1];const np=randomPetByMinRarity(minR);if(np&&!S.zoo.find(p=>p.id===np.id))S.zoo.push({...np,petLevel:1});}
  addLog(`🛒 Gekauft: ${item.name}`);
  saveState();
  float(`🛒 ${item.name}`,"#fbbf24");
  render();
}

function equipItem(uid){
  const item=S.inventory.find(i=>i.uid===uid);
  if(!item)return;
  S.character.equipment={...S.character.equipment,[item.slot]:{...item}};
  float(`${item.icon} ${item.name} ausgerüstet!`,RARITIES[item.rarity].color);
  addLog(`⚔️ Ausgerüstet: ${item.name}`);

function equipPet(petId){

function addNewQuest(title,cat,dc,dungeonId){

// Point buy
const PB_COSTS={8:0,9:1,10:2,11:3,12:4,13:5,14:7,15:9};
function pbSpend(attr,dir){
  if(!PB_ATTRS)return;
  const cur=PB_ATTRS[attr];const next=cur+dir;
  if(next<8||next>15)return;
  const cost=dir>0?(PB_COSTS[next]-PB_COSTS[cur]):-(PB_COSTS[cur]-PB_COSTS[next]);
  const rem=pbRemaining();
  if(rem-cost<0)return;
  PB_ATTRS[attr]=next;
  render();
}
function pbRemaining(){
  if(!PB_ATTRS)return 27;
  return 27-Object.entries(PB_ATTRS).reduce((sum,[k,v])=>sum+(PB_COSTS[v]||0),0);
}

// Boss fight state
let BOSS_STATE=null;
function startBoss(dungeonId){
  const dng=S.dungeons.find(d=>d.id===dungeonId);
  if(!dng||dng.bossKilled)return;
  BOSS_STATE={dungeonId,bossHp:dng.boss.maxHp,playerHp:S.character.hp,log:[],phase:"idle",lastRoll:null,rolling:false};
  MODAL={type:"boss",data:{dungeonId}};
  render();
}

function bossDieRoll(){
  if(!BOSS_STATE||BOSS_STATE.rolling||BOSS_STATE.phase!=="idle")return;
  BOSS_STATE.rolling=true;
  BOSS_STATE.lastRoll=null;
  let t=0;
  const interval=setInterval(()=>{
    t++;
    document.getElementById("boss-die")&&(document.getElementById("boss-die").textContent=d20());
    if(t>14){
      clearInterval(interval);
      const raw=d20();
      const attrs=computedAttrs();
      const totalMod=Object.values(attrs).reduce((s,v)=>s+Math.max(0,attrMod(v)),0);
      const dng=S.dungeons.find(d=>d.id===BOSS_STATE.dungeonId);
      const boss=dng.boss;
      const total=Math.min(raw+Math.floor(totalMod/3),20);
      BOSS_STATE.lastRoll={raw,total,isCrit:raw===20,isFail:raw===1,success:raw===20||(total>=boss.dc)};
      BOSS_STATE.rolling=false;
      if(document.getElementById("boss-die"))document.getElementById("boss-die").textContent=raw;
      renderBossActions();
    }
  },60);
}

function bossAttack(){
  if(!BOSS_STATE||!BOSS_STATE.lastRoll)return;
  const dng=S.dungeons.find(d=>d.id===BOSS_STATE.dungeonId);
  const boss=dng.boss;
  const {raw,total,isCrit,isFail,success}=BOSS_STATE.lastRoll;
  BOSS_STATE.lastRoll=null;

  const playerAtk=8+Math.floor(S.character.level*1.5);
  const dmg=isCrit?playerAtk*2:success?playerAtk:Math.floor(playerAtk*.25);
  BOSS_STATE.bossHp=Math.max(0,BOSS_STATE.bossHp-dmg);
  BOSS_STATE.log.unshift(isCrit?`⚡ KRIT! Du: ${dmg} Schaden!`:success?`⚔️ Treffer! ${dmg} Schaden`:`💨 Fehlschlag... ${dmg} Schaden`);

  if(BOSS_STATE.bossHp<=0){
    BOSS_STATE.phase="victory";
    addLog(`🏆 Boss besiegt: ${boss.name}!`);
    renderBossScreen();return;
  }

  BOSS_STATE.phase="bossAttack";
  renderBossScreen();
  setTimeout(()=>{
    const bDmg=isFail?boss.atk*2:success?Math.floor(boss.atk*.4):boss.atk;
    BOSS_STATE.playerHp=Math.max(0,BOSS_STATE.playerHp-bDmg);
    const taunt=boss.taunt[Math.floor(Math.random()*boss.taunt.length)];
    BOSS_STATE.log.unshift(`${boss.icon} "${taunt}" — ${bDmg} Schaden!`);
    if(BOSS_STATE.playerHp<=0){BOSS_STATE.phase="defeat";addLog(`💀 Niederlage gegen ${boss.name}.`);}
    else BOSS_STATE.phase="idle";
    renderBossScreen();
  },900);
}

function bossVictory(){
  const dng=S.dungeons.find(d=>d.id===BOSS_STATE.dungeonId);
  const r=dng.boss.reward;
  const lootItem=randomItemByTier("great");
  if(lootItem)S.inventory.push({...lootItem,uid:Date.now()});
  gainXPGold(r.xp,r.gold);
  S.dungeons=S.dungeons.map(d=>d.id===BOSS_STATE.dungeonId?{...d,bossKilled:true}:d);
  float(`🏆 BOSS BESIEGT! +${r.xp}XP`,"#fbbf24");
  BOSS_STATE=null;MODAL=null;saveState();render();
}

function bossDefeat(){
  if(S.buffs?.streakshield){delete S.buffs.streakshield;float("🛡️ Streak-Schutz aktiviert!","#22c55e");}
  else S.character.streak=0;
  BOSS_STATE=null;MODAL=null;saveState();render();
}

    html+=`<div style="position:absolute;bottom:2px;left:8px;font-size:9px;color:#4b5563;font-family:'Cinzel',serif">${hb.name} · Lv ${lv}</div>`;
    html+=`</div>`;
  } else {
    // Himmelspalast
    html+=`<div class="scene-sky" style="background:linear-gradient(180deg,#050520 0%,#0a0535 50%,#150a30 100%)">`;
    for(let i=0;i<25;i++){const x=Math.random()*100,y=Math.random()*80,s=Math.random()*3+.5,d=Math.random()*4;html+=`<div class="star" style="left:${x}%;top:${y}%;width:${s}px;height:${s}px;animation-delay:${d}s"></div>`;}
    // Wolken
    html+=`<div style="position:absolute;bottom:25px;left:5%;font-size:30px;opacity:.4">☁️</div>`;
    html+=`<div style="position:absolute;bottom:35px;right:5%;font-size:22px;opacity:.3">☁️</div>`;
    // Palast auf wolke
    html+=`<div style="position:absolute;bottom:30px;left:50%;transform:translateX(-50%);text-align:center;animation:float 4s infinite">
      <div style="font-size:36px;filter:drop-shadow(0 0 12px #f9a8d4)">✨</div>
      <div style="font-size:24px;margin-top:-10px">🏯</div>
    </div>`;
    html+=`<div style="position:absolute;bottom:2px;left:8px;font-size:9px;color:#4b5563;font-family:'Cinzel',serif">${hb.name} · Lv ${lv}</div>`;
    html+=`</div>`;
  }

  html+=`<div style="position:absolute;bottom:4px;right:8px;font-size:9px;color:var(--purple2);font-family:'Cinzel',serif;font-style:italic">${hb.story.substring(0,40)}...</div>`;
  html+=`</div>`;
  return html;
}

function renderAttrs(){
  const attrs=computedAttrs();
  return`<div class="card" style="padding:10px 12px">
    <div class="attr-grid">
      ${Object.entries(ATTRS).map(([k,a])=>{
        const v=attrs[k]||8;const mod=attrMod(v);

function rarityBadge(r,small){

function renderQuestCard(q,dungeonId){

  return`<div class="quest-card${q.done?" done":""}" style="border-color:${q.done?"var(--border)":col+"55"}">

// MAIN RENDER

function render(){
  const app=document.getElementById("app");
  if(!S||!S.setup){
    app.innerHTML=renderPointBuy();
    return;
  }

  if(MODAL){
    if(MODAL.type==="boss"){
      app.innerHTML=`<div id="boss-screen" style="min-height:100vh;overflow-y:auto"></div>`;
      renderBossScreen();
      return;
    }
    if(MODAL.type==="rollresult"){app.innerHTML=`${buildShell()}${renderRollModal(MODAL.data)}`;return;}
    if(MODAL.type==="levelup"){app.innerHTML=`${buildShell()}${renderLvlUp()}`;return;}
    if(MODAL.type==="tutorial"){app.innerHTML=`${buildShell()}${renderTutorial()}`;return;}
  }

  app.innerHTML=buildShell();
}

function buildShell(){
  let content="";
  if(TAB==="quests")content=renderQuests();
  else if(TAB==="dungeons")content=renderDungeons();
  else if(TAB==="zoo")content=renderZoo();
  else if(TAB==="gear")content=renderGear();
  else if(TAB==="shop")content=renderShop();
  else if(TAB==="profil")content=renderProfil();
  else if(TAB==="add")content=renderAdd();

  return`${renderHeader()}<div id="content">${content}</div>${renderNav()}`;
}
